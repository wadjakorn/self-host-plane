services:
  plane-mcp:
    build: .
    image: plane-mcp-local:latest
    container_name: plane-mcp
    restart: unless-stopped
    env_file: .env
    ports:
      # Loopback-only: the api-key endpoint trusts any caller with a valid PAT,
      # so don't expose it to the LAN. Claude connects via localhost.
      # To reach it from other hosts, front it with a reverse proxy + TLS instead.
      - "127.0.0.1:${MCP_PORT:-8211}:8211"
    networks:
      - plane

# Reuse the network created by the Plane stack (plane-selfhost/plane-app).
# Lets this container reach Plane at http://proxy (no host IP needed).
# If your Plane network has a different name, run:  docker network ls | grep plane
networks:
  plane:
    external: true
    name: plane-app_default
